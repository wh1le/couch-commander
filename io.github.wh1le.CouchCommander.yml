app-id: io.github.wh1le.CouchCommander
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: couch-commander
appstream-compose: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=~/.config/lgtv:create

modules:
  - generated-sources.json

  - name: poetry-core
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} poetry-core
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/0e/38/646023abf93e47c6808cbee82423324505ec075d7b90a22654765e1eade7/poetry_core-2.3.2-py3-none-any.whl
        sha256: 23df641b64f87fbb4ce1873c1915a4d4bb1b7d808c596e4307edc073e68d7234

  - name: couch-commander
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation .
      - install -Dm644 io.github.wh1le.CouchCommander.desktop ${FLATPAK_DEST}/share/applications/io.github.wh1le.CouchCommander.desktop
      - install -Dm644 io.github.wh1le.CouchCommander.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.wh1le.CouchCommander.metainfo.xml
      - install -Dm644 assets/icon-512.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/io.github.wh1le.CouchCommander.png
      - install -Dm644 assets/icon-128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.wh1le.CouchCommander.png
      - install -Dm644 assets/icon-64.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/io.github.wh1le.CouchCommander.png
      - install -Dm644 assets/icon-48.png ${FLATPAK_DEST}/share/icons/hicolor/48x48/apps/io.github.wh1le.CouchCommander.png
    sources:
      - type: dir
        path: .
